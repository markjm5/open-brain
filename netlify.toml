# Netlify configuration for the Open Brain Dashboard
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build from the dashboard subdirectory
  base    = "dashboards/open-brain-dashboard"
  command = "npm run build"
  # adapter-netlify writes static assets to "build/" by default
  publish = "build"

[build.environment]
  NODE_VERSION = "22"

# Required environment variables — set ALL of these in Netlify UI → Site settings → Environment variables.
# Variables in [build.environment] above only apply at build time; the entries below must also exist
# as site-level env vars so the Netlify serverless function runtime picks them up.
#
#   NODE_OPTIONS        = --max-http-header-size=65536
#                         (Supabase session cookies can exceed Node's default 16 KB header limit,
#                          causing HTTP 400 on every authenticated request. This raises the cap to 64 KB.)
#
#   MCP_URL             = https://YOUR-PROJECT.supabase.co/functions/v1/open-brain-mcp
#   MCP_KEY             = your-mcp-access-key
#   PUBLIC_SUPABASE_URL = https://YOUR-PROJECT.supabase.co
#   PUBLIC_SUPABASE_ANON_KEY = your-supabase-anon-key
